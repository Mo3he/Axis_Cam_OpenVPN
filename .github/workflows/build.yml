---
name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

# Needed for the release-attach step to upload .eap assets on tag builds.
permissions:
  contents: write

jobs:
  build_acap:
    name: Build ACAP packages
    runs-on: ubuntu-latest
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - uses: actions/checkout@v4

      # Cross-compiling the OpenVPN3 core is a single large translation unit;
      # give the compiler more headroom via swap to avoid OOM on the runner.
      # Best-effort: the runner's default /swapfile is in use, so add our own
      # on /mnt (which has plenty of free space). Never fail the build on this.
      - name: Increase swap
        continue-on-error: true
        run: |
          sudo swapoff -a || true
          sudo rm -f /mnt/swapfile || true
          sudo fallocate -l 12G /mnt/swapfile || sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=12288
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      # Builds the openvpn3-base image and the .eap for both architectures.
      - name: Build (aarch64 + armv7hf)
        run: RUNTIME=docker sh ./build.sh

      - name: Verify packages
        run: |
          for f in *.eap; do
            echo "== $f =="
            tar tzf "$f"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eap-packages
          path: "*.eap"
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.eap"
